name: Notify Skill Sync Webhook

on:
  push:
    branches:
      - master

jobs:
  webhook:
    runs-on: ubuntu-latest
    steps:
      - name: Send webhook to Mac Mini
        run: |
          # Compute HMAC-SHA256 signature for GitHub webhook verification.
          # The secret is stored as a repo + environment secret.
          # Body is the raw push event JSON.
          PAYLOAD='${{ github.event }}'
          SECRET="${{ vars.WEBHOOK_SECRET }}"
          SIGNATURE="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$SECRET" | sed 's/^.* //')"

          curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -H "X-GitHub-Event: push" \
            -H "X-GitHub-Delivery: ${{ github.run_id }}" \
            -d "$PAYLOAD" \
            "${{ vars.WEBHOOK_URL }}"
