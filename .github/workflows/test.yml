name: Test Skills

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  test:
    name: "${{ matrix.skill }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        skill:
          - obsidian-brokerage-activity-manager
          - obsidian-exercise-kind-manager
          - obsidian-people-kind-manager
          - obsidian-planetary-tasks-manager
          - obsidian-portfolio-holdings-manager
          - obsidian-zettel-manager

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - name: Run tests — ${{ matrix.skill }}
        run: |
          uvx --python 3.13 \
            --with pydantic \
            --with pyyaml \
            --with polars \
            --with pytest \
            pytest obsidian-plugin/skills/${{ matrix.skill }}/tests/ -v
