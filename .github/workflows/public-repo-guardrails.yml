name: Public Repo Guardrails

on:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run public safety scan
        run: |
          chmod +x scripts/check_public_repo_guardrails.sh
          scripts/check_public_repo_guardrails.sh "${{ github.event.pull_request.base.sha }}"
