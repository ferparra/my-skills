name: Skill Artifact & Compliance Check

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  artifact-check:
    name: Skill artifact alignment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check skill artifacts
        run: python3 scripts/check_skill_artifacts.py

  anthropic-compliance:
    name: Anthropic Claude skill compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run Anthropic compliance checks
        run: python3 scripts/check_anthropic_compliance.py
