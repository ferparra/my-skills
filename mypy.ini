[mypy]
python_version = 3.12
plugins = pydantic.mypy
strict = True
warn_unused_configs = True
exclude = (^|/)(\.git|\.github|\.venv|__pycache__|references)(/|$)
files =
    scripts,
    productivity-plugin/skills,
    obsidian-plugin/skills
mypy_path =
    scripts
    obsidian-plugin/skills/obsidian-excalidraw-visual-validator/scripts
    obsidian-plugin/skills/obsidian-excalidraw-file-generation/references
    productivity-plugin/skills/jira-sprint-sync/scripts
    obsidian-plugin/skills/obsidian-agent-memory-capture/scripts
    obsidian-plugin/skills/obsidian-brokerage-activity-manager/scripts
    obsidian-plugin/skills/obsidian-exercise-kind-manager/scripts
    obsidian-plugin/skills/obsidian-interweave-engine/scripts
    obsidian-plugin/skills/obsidian-notebooklm-bases-manager/scripts
    obsidian-plugin/skills/obsidian-personal-os-router/scripts
    obsidian-plugin/skills/obsidian-planetary-tasks-manager/scripts
    obsidian-plugin/skills/obsidian-portfolio-holdings-manager/scripts
    obsidian-plugin/skills/obsidian-token-budget-guard/scripts
    obsidian-plugin/skills/obsidian-weekly-feedback-loop/scripts
    obsidian-plugin/skills/obsidian-people-kind-manager/scripts
    obsidian-plugin/skills/obsidian-zettel-manager/scripts

[pydantic-mypy]
init_typed = True
warn_required_dynamic_aliases = True
