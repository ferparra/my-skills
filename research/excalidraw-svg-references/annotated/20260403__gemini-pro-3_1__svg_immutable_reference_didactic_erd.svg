<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 850" style="background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <!-- DIAGRAM_TYPE: erd -->
  <!-- TOPOLOGY: 4 entity nodes, 3 relationship edges, linear chain with one vertical branch: Customer -[places]-> Order -[contains]-> Order_Item <-[includes]- Product -->
  <desc>An Entity-Relationship Diagram using Crow's Foot notation showing an e-commerce data model. Customer (1) places (0..many) Orders. Each Order (1) contains (1..many) Order_Items. Each Order_Item references a Product via a composite primary key. Product (1) is included in (0..many) Order_Items. The diagram includes a legend explaining Crow's Foot cardinality symbols and key types (PK, FK).</desc>

  <g id="diagram-title" role="heading" data-semantic-role="title">
    <text x="800" y="60" text-anchor="middle" font-weight="700" font-size="24" fill="#1e293b" letter-spacing="1">ENTITY-RELATIONSHIP (ER) DIAGRAM</text>
    <text x="800" y="90" text-anchor="middle" font-weight="600" font-size="16" fill="#475569" letter-spacing="0.5">RELATIONAL DATA MODEL &amp; CROW'S FOOT NOTATION</text>
  </g>

  <!-- Relationship edges -->
  <g id="edge-customer-places-order" role="img" aria-label="Customer places Order: one Customer to zero-or-many Orders" data-semantic-role="relationship" data-from="entity-customer" data-to="entity-order" data-cardinality="1:0..*" data-label="PLACES">
    <path d="M 430 290 L 650 290" stroke="#475569" stroke-width="3" fill="none" />
    <line x1="440" y1="280" x2="440" y2="300" stroke="#475569" stroke-width="3" />
    <line x1="450" y1="280" x2="450" y2="300" stroke="#475569" stroke-width="3" />
    <path d="M 650 290 L 635 278 M 650 290 L 635 302" stroke="#475569" stroke-width="3" fill="none" />
    <circle cx="622" cy="290" r="5" fill="#fafafa" stroke="#475569" stroke-width="3" />
    <rect x="495" y="255" width="90" height="20" rx="4" fill="#fafafa" />
    <text x="540" y="270" text-anchor="middle" font-weight="700" font-size="12" fill="#64748b">PLACES ➔</text>
  </g>

  <g id="edge-order-contains-order-item" role="img" aria-label="Order contains Order Item: one Order to one-or-many Order Items" data-semantic-role="relationship" data-from="entity-order" data-to="entity-order-item" data-cardinality="1:1..*" data-label="CONTAINS">
    <path d="M 930 290 L 1150 290" stroke="#475569" stroke-width="3" fill="none" />
    <line x1="940" y1="280" x2="940" y2="300" stroke="#475569" stroke-width="3" />
    <line x1="950" y1="280" x2="950" y2="300" stroke="#475569" stroke-width="3" />
    <path d="M 1150 290 L 1135 278 M 1150 290 L 1135 302" stroke="#475569" stroke-width="3" fill="none" />
    <line x1="1125" y1="280" x2="1125" y2="300" stroke="#475569" stroke-width="3" />
    <rect x="990" y="255" width="100" height="20" rx="4" fill="#fafafa" />
    <text x="1040" y="270" text-anchor="middle" font-weight="700" font-size="12" fill="#64748b">CONTAINS ➔</text>
  </g>

  <g id="edge-product-includes-order-item" role="img" aria-label="Product included in Order Item: one Product to zero-or-many Order Items" data-semantic-role="relationship" data-from="entity-product" data-to="entity-order-item" data-cardinality="1:0..*" data-label="INCLUDES">
    <path d="M 1290 550 L 1290 400" stroke="#475569" stroke-width="3" fill="none" />
    <line x1="1280" y1="540" x2="1300" y2="540" stroke="#475569" stroke-width="3" />
    <line x1="1280" y1="530" x2="1300" y2="530" stroke="#475569" stroke-width="3" />
    <path d="M 1290 400 L 1278 415 M 1290 400 L 1302 415" stroke="#475569" stroke-width="3" fill="none" />
    <circle cx="1290" cy="428" r="5" fill="#fafafa" stroke="#475569" stroke-width="3" />
    <rect x="1305" y="465" width="100" height="20" rx="4" fill="#fafafa" />
    <text x="1355" y="480" text-anchor="middle" font-weight="700" font-size="12" fill="#64748b">INCLUDES ➔</text>
  </g>

  <!-- Entity nodes -->
  <g id="entity-customer" role="img" aria-label="Customer entity with fields: id (PK, UUID), email_address (VARCHAR), full_name (VARCHAR), created_at (TIMESTAMP)" data-semantic-role="entity" data-entity-fields="id,email_address,full_name,created_at" data-downstream="entity-order" data-upstream="">
    <g transform="translate(150, 200)">
      <rect width="280" height="200" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
      <rect width="280" height="40" rx="8" fill="#a7f3d0" />
      <rect y="20" width="280" height="20" fill="#a7f3d0" />
      <text x="140" y="26" text-anchor="middle" font-weight="800" font-size="14" fill="#022c22">CUSTOMER</text>
      <line x1="0" y1="40" x2="280" y2="40" stroke="#cbd5e1" stroke-width="2" />

      <rect x="15" y="55" width="28" height="16" rx="4" fill="#fbbf24" />
      <text x="29" y="67" text-anchor="middle" font-weight="700" font-size="10" fill="#78350f">PK</text>
      <text x="55" y="68" font-weight="700" font-size="13" fill="#1e293b">id</text>
      <text x="265" y="68" text-anchor="end" font-weight="600" font-size="11" fill="#94a3b8">UUID</text>
      <line x1="15" y1="80" x2="265" y2="80" stroke="#f1f5f9" stroke-width="1" />

      <text x="55" y="103" font-weight="500" font-size="13" fill="#334155">email_address</text>
      <text x="265" y="103" text-anchor="end" font-weight="600" font-size="11" fill="#94a3b8">VARCHAR</text>
      <line x1="15" y1="115" x2="265" y2="115" stroke="#f1f5f9" stroke-width="1" />

      <text x="55" y="138" font-weight="500" font-size="13" fill="#334155">full_name</text>
      <text x="265" y="138" text-anchor="end" font-weight="600" font-size="11" fill="#94a3b8">VARCHAR</text>
      <line x1="15" y1="150" x2="265" y2="150" stroke="#f1f5f9" stroke-width="1" />

      <text x="55" y="173" font-weight="500" font-size="13" fill="#334155">created_at</text>
      <text x="265" y="173" text-anchor="end" font-weight="600" font-size="11" fill="#94a3b8">TIMESTAMP</text>
    </g>
  </g>

  <g id="entity-order" role="img" aria-label="Order entity with fields: id (PK, UUID), customer_id (FK, UUID), order_status (ENUM), total_amount (DECIMAL)" data-semantic-role="entity" data-entity-fields="id,customer_id,order_status,total_amount" data-downstream="entity-order-item" data-upstream="entity-customer">
    <g transform="translate(650, 200)">
      <rect width="280" height="200" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
      <rect width="280" height="40" rx="8" fill="#c7d2fe" />
      <rect y="20" width="280" height="20" fill="#c7d2fe" />
      <text x="140" y="26" text-anchor="middle" font-weight="800" font-size="14" fill="#312e81">ORDER</text>
      <line x1="0" y1="40" x2="280" y2="40" stroke="#cbd5e1" stroke-width="2" />

      <rect x="15" y="55" width="28" height="16" rx="4" fill="#fbbf24" />
      <text x="29" y="67" text-anchor="middle" font-weight="700" font-size="10" fill="#78350f">PK</text>
      <text x="55" y="68" font-weight="700" font-size="13" fill="#1e293b">id</text>
      <text x="265" y="68" text-anchor="end" font-weight="600" font-size="11" fill="#94a3b8">UUID</text>
      <line x1="15" y1="80" x2="265" y2="80" stroke="#f1f5f9" stroke-width="1" />

      <rect x="15" y="90" width="28" height="16" rx="4" fill="#94a3b8" />
      <text x="29" y="102" text-anchor="middle" font-weight="700" font-size="10" fill="#ffffff">FK</text>
      <text x="55" y="103" font-weight="500" font-size="13" fill="#334155">customer_id</text>
      <text x="265" y="103" text-anchor="end" font-weight="600" font-size="11" fill="#94a3b8">UUID</text>
      <line x1="15" y1="115" x2="265" y2="115" stroke="#f1f5f9" stroke-width="1" />

      <text x="55" y="138" font-weight="500" font-size="13" fill="#334155">order_status</text>
      <text x="265" y="138" text-anchor="end" font-weight="600" font-size="11" fill="#94a3b8">ENUM</text>
      <line x1="15" y1="150" x2="265" y2="150" stroke="#f1f5f9" stroke-width="1" />

      <text x="55" y="173" font-weight="500" font-size="13" fill="#334155">total_amount</text>
      <text x="265" y="173" text-anchor="end" font-weight="600" font-size="11" fill="#94a3b8">DECIMAL</text>
    </g>
  </g>

  <g id="entity-order-item" role="img" aria-label="Order Item entity with fields: order_id (PK+FK, UUID), product_id (PK+FK, UUID), quantity (INT), unit_price (DECIMAL)" data-semantic-role="entity" data-entity-fields="order_id,product_id,quantity,unit_price" data-downstream="" data-upstream="entity-order,entity-product">
    <g transform="translate(1150, 200)">
      <rect width="280" height="200" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
      <rect width="280" height="40" rx="8" fill="#fed7aa" />
      <rect y="20" width="280" height="20" fill="#fed7aa" />
      <text x="140" y="26" text-anchor="middle" font-weight="800" font-size="14" fill="#431407">ORDER_ITEM</text>
      <line x1="0" y1="40" x2="280" y2="40" stroke="#cbd5e1" stroke-width="2" />

      <rect x="15" y="55" width="40" height="16" rx="4" fill="#fbbf24" />
      <text x="35" y="67" text-anchor="middle" font-weight="700" font-size="10" fill="#78350f">PK,FK</text>
      <text x="65" y="68" font-weight="700" font-size="13" fill="#1e293b">order_id</text>
      <text x="265" y="68" text-anchor="end" font-weight="600" font-size="11" fill="#94a3b8">UUID</text>
      <line x1="15" y1="80" x2="265" y2="80" stroke="#f1f5f9" stroke-width="1" />

      <rect x="15" y="90" width="40" height="16" rx="4" fill="#fbbf24" />
      <text x="35" y="102" text-anchor="middle" font-weight="700" font-size="10" fill="#78350f">PK,FK</text>
      <text x="65" y="103" font-weight="700" font-size="13" fill="#1e293b">product_id</text>
      <text x="265" y="103" text-anchor="end" font-weight="600" font-size="11" fill="#94a3b8">UUID</text>
      <line x1="15" y1="115" x2="265" y2="115" stroke="#f1f5f9" stroke-width="1" />

      <text x="65" y="138" font-weight="500" font-size="13" fill="#334155">quantity</text>
      <text x="265" y="138" text-anchor="end" font-weight="600" font-size="11" fill="#94a3b8">INT</text>
      <line x1="15" y1="150" x2="265" y2="150" stroke="#f1f5f9" stroke-width="1" />

      <text x="65" y="173" font-weight="500" font-size="13" fill="#334155">unit_price</text>
      <text x="265" y="173" text-anchor="end" font-weight="600" font-size="11" fill="#94a3b8">DECIMAL</text>
    </g>
  </g>

  <g id="entity-product" role="img" aria-label="Product entity with fields: id (PK, UUID), sku_code (VARCHAR), product_name (VARCHAR), stock_count (INT)" data-semantic-role="entity" data-entity-fields="id,sku_code,product_name,stock_count" data-downstream="entity-order-item" data-upstream="">
    <g transform="translate(1150, 550)">
      <rect width="280" height="200" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
      <rect width="280" height="40" rx="8" fill="#fbcfe8" />
      <rect y="20" width="280" height="20" fill="#fbcfe8" />
      <text x="140" y="26" text-anchor="middle" font-weight="800" font-size="14" fill="#4c0b20">PRODUCT</text>
      <line x1="0" y1="40" x2="280" y2="40" stroke="#cbd5e1" stroke-width="2" />

      <rect x="15" y="55" width="28" height="16" rx="4" fill="#fbbf24" />
      <text x="29" y="67" text-anchor="middle" font-weight="700" font-size="10" fill="#78350f">PK</text>
      <text x="55" y="68" font-weight="700" font-size="13" fill="#1e293b">id</text>
      <text x="265" y="68" text-anchor="end" font-weight="600" font-size="11" fill="#94a3b8">UUID</text>
      <line x1="15" y1="80" x2="265" y2="80" stroke="#f1f5f9" stroke-width="1" />

      <text x="55" y="103" font-weight="500" font-size="13" fill="#334155">sku_code</text>
      <text x="265" y="103" text-anchor="end" font-weight="600" font-size="11" fill="#94a3b8">VARCHAR</text>
      <line x1="15" y1="115" x2="265" y2="115" stroke="#f1f5f9" stroke-width="1" />

      <text x="55" y="138" font-weight="500" font-size="13" fill="#334155">product_name</text>
      <text x="265" y="138" text-anchor="end" font-weight="600" font-size="11" fill="#94a3b8">VARCHAR</text>
      <line x1="15" y1="150" x2="265" y2="150" stroke="#f1f5f9" stroke-width="1" />

      <text x="55" y="173" font-weight="500" font-size="13" fill="#334155">stock_count</text>
      <text x="265" y="173" text-anchor="end" font-weight="600" font-size="11" fill="#94a3b8">INT</text>
    </g>
  </g>

  <!-- Legend -->
  <g id="legend" role="img" aria-label="Legend: Crow's Foot notation symbols and key types" data-semantic-role="legend">
    <g transform="translate(150, 480)">
      <rect width="320" height="270" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2" />
      <text x="160" y="30" text-anchor="middle" font-weight="800" font-size="14" fill="#334155">CROW'S FOOT LEGEND</text>
      <line x1="20" y1="45" x2="300" y2="45" stroke="#e2e8f0" stroke-width="2" />

      <path d="M 20 80 L 80 80" stroke="#475569" stroke-width="3" fill="none" />
      <line x1="60" y1="70" x2="60" y2="90" stroke="#475569" stroke-width="3" />
      <line x1="70" y1="70" x2="70" y2="90" stroke="#475569" stroke-width="3" />
      <text x="100" y="84" font-weight="600" font-size="13" fill="#334155">Exactly One</text>

      <path d="M 20 120 L 80 120" stroke="#475569" stroke-width="3" fill="none" />
      <circle cx="50" cy="120" r="5" fill="#f8fafc" stroke="#475569" stroke-width="3" />
      <line x1="70" y1="110" x2="70" y2="130" stroke="#475569" stroke-width="3" />
      <text x="100" y="124" font-weight="600" font-size="13" fill="#334155">Zero or One</text>

      <path d="M 20 160 L 80 160" stroke="#475569" stroke-width="3" fill="none" />
      <line x1="60" y1="150" x2="60" y2="170" stroke="#475569" stroke-width="3" />
      <path d="M 80 160 L 65 148 M 80 160 L 65 172" stroke="#475569" stroke-width="3" fill="none" />
      <text x="100" y="164" font-weight="600" font-size="13" fill="#334155">One or Many</text>

      <path d="M 20 200 L 80 200" stroke="#475569" stroke-width="3" fill="none" />
      <circle cx="50" cy="200" r="5" fill="#f8fafc" stroke="#475569" stroke-width="3" />
      <path d="M 80 200 L 65 188 M 80 200 L 65 212" stroke="#475569" stroke-width="3" fill="none" />
      <text x="100" y="204" font-weight="600" font-size="13" fill="#334155">Zero or Many</text>

      <rect x="20" y="235" width="28" height="16" rx="4" fill="#fbbf24" />
      <text x="34" y="247" text-anchor="middle" font-weight="700" font-size="10" fill="#78350f">PK</text>
      <text x="60" y="248" font-weight="600" font-size="12" fill="#334155">Primary Key</text>

      <rect x="160" y="235" width="28" height="16" rx="4" fill="#94a3b8" />
      <text x="174" y="247" text-anchor="middle" font-weight="700" font-size="10" fill="#ffffff">FK</text>
      <text x="200" y="248" font-weight="600" font-size="12" fill="#334155">Foreign Key</text>
    </g>
  </g>

</svg>
