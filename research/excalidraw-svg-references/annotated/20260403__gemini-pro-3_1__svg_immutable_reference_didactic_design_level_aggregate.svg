<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1000" style="background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
<!-- DIAGRAM_TYPE: aggregate_design -->
<!-- TOPOLOGY: 5 nodes (1 aggregate root, 1 local entity, 1 value object, 2 commands, 2 domain events), 6 edges (2 command-to-root, 2 root-to-event, 2 composition), 1 annotation sticky note, 1 legend panel. Central aggregate boundary contains root + children. -->
  <desc>A Domain-Driven Design aggregate diagram showing the ORDER aggregate. The ORDER aggregate root receives AddLineItemCmd and SubmitOrderCmd commands, processes them through its behaviors (addItem, submitOrder), and emits LineItemAddedEvt and OrderSubmittedEvt domain events. The aggregate contains ORDER_LINE as a local entity (1..* composition) and SHIPPING_ADDRESS as a value object (1 composition). Business invariants are annotated: at least 1 LineItem required for submitOrder, and addItem blocked unless status is NEW. The transactional boundary encloses the root and its children, enforcing atomic consistency. A legend explains aggregate root, local entity, value object, and business invariant concepts.</desc>
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>

    <marker id="arrow-cmd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0284c7" />
    </marker>

    <marker id="arrow-evt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c" />
    </marker>

    <marker id="diamond-filled" viewBox="0 0 12 12" refX="1" refY="6" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 6 L 6 0 L 12 6 L 6 12 Z" fill="#312e81" stroke="#312e81" stroke-width="1" />
    </marker>
  </defs>

  <g id="diagram-title" role="heading" data-semantic-role="title">
    <text x="900" y="60" text-anchor="middle" font-weight="700" font-size="24" fill="#1e293b" letter-spacing="1">DESIGN-LEVEL AGGREGATE DIAGRAM</text>
    <text x="900" y="90" text-anchor="middle" font-weight="600" font-size="16" fill="#475569" letter-spacing="0.5">THE TRANSACTIONAL BOUNDARY &amp; WRITE MODEL STATE TRANSITIONS</text>
  </g>


  <g id="transactional-boundary" role="img" aria-label="Transactional boundary enclosing the aggregate root and its children" data-semantic-role="container">
    <rect x="450" y="180" width="900" height="550" rx="20" fill="#f8fafc" stroke="#94a3b8" stroke-width="3" stroke-dasharray="12,8" />

    <rect x="480" y="165" width="280" height="30" rx="6" fill="#e2e8f0" />
    <text x="620" y="185" text-anchor="middle" font-weight="800" font-size="12" fill="#334155">TRANSACTIONAL BOUNDARY</text>

    <text x="900" y="715" text-anchor="middle" font-weight="600" font-size="13" fill="#64748b">Changes inside this boundary succeed or fail as a single atomic unit.</text>
  </g>


  <g id="edge-addlineitemcmd-to-order" role="img" aria-label="AddLineItemCmd flows into ORDER aggregate root" data-semantic-role="edge" data-from="node-addlineitemcmd" data-to="node-order">
    <path d="M 320 280 L 610 280" stroke="#0284c7" stroke-width="4" fill="none" marker-end="url(#arrow-cmd)" />
  </g>

  <g id="edge-submitordercmd-to-order" role="img" aria-label="SubmitOrderCmd flows into ORDER aggregate root" data-semantic-role="edge" data-from="node-submitordercmd" data-to="node-order">
    <path d="M 320 380 L 610 380" stroke="#0284c7" stroke-width="4" fill="none" marker-end="url(#arrow-cmd)" />
  </g>

  <g id="edge-order-to-lineitemaddedevt" role="img" aria-label="ORDER emits LineItemAddedEvt" data-semantic-role="edge" data-from="node-order" data-to="node-lineitemaddedevt">
    <path d="M 1180 280 L 1480 280" stroke="#ea580c" stroke-width="4" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow-evt)" />
  </g>

  <g id="edge-order-to-ordersubmittedevt" role="img" aria-label="ORDER emits OrderSubmittedEvt" data-semantic-role="edge" data-from="node-order" data-to="node-ordersubmittedevt">
    <path d="M 1180 380 L 1480 380" stroke="#ea580c" stroke-width="4" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow-evt)" />
  </g>


  <g id="node-addlineitemcmd" role="img" aria-label="Command: AddLineItemCmd" data-semantic-role="node" data-downstream="node-order">
    <g transform="translate(100, 250)">
      <rect width="220" height="60" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2" />
      <text x="110" y="25" text-anchor="middle" font-weight="800" font-size="12" fill="#0369a1">&lt;&lt;Command&gt;&gt;</text>
      <text x="110" y="45" text-anchor="middle" font-weight="700" font-size="14" fill="#0c4a6e">AddLineItemCmd</text>
    </g>
  </g>

  <g id="node-submitordercmd" role="img" aria-label="Command: SubmitOrderCmd" data-semantic-role="node" data-downstream="node-order">
    <g transform="translate(100, 350)">
      <rect width="220" height="60" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2" />
      <text x="110" y="25" text-anchor="middle" font-weight="800" font-size="12" fill="#0369a1">&lt;&lt;Command&gt;&gt;</text>
      <text x="110" y="45" text-anchor="middle" font-weight="700" font-size="14" fill="#0c4a6e">SubmitOrderCmd</text>
    </g>
  </g>

  <g id="node-lineitemaddedevt" role="img" aria-label="Domain Event: LineItemAddedEvt" data-semantic-role="node" data-upstream="node-order">
    <g transform="translate(1480, 250)">
      <rect width="220" height="60" rx="8" fill="#ffedd5" stroke="#fb923c" stroke-width="2" />
      <text x="110" y="25" text-anchor="middle" font-weight="800" font-size="12" fill="#c2410c">&lt;&lt;Domain Event&gt;&gt;</text>
      <text x="110" y="45" text-anchor="middle" font-weight="700" font-size="14" fill="#7c2d12">LineItemAddedEvt</text>
    </g>
  </g>

  <g id="node-ordersubmittedevt" role="img" aria-label="Domain Event: OrderSubmittedEvt" data-semantic-role="node" data-upstream="node-order">
    <g transform="translate(1480, 350)">
      <rect width="220" height="60" rx="8" fill="#ffedd5" stroke="#fb923c" stroke-width="2" />
      <text x="110" y="25" text-anchor="middle" font-weight="800" font-size="12" fill="#c2410c">&lt;&lt;Domain Event&gt;&gt;</text>
      <text x="110" y="45" text-anchor="middle" font-weight="700" font-size="14" fill="#7c2d12">OrderSubmittedEvt</text>
    </g>
  </g>


  <g id="edge-order-to-orderline" role="img" aria-label="Composition: ORDER contains 1..* ORDER_LINE" data-semantic-role="edge" data-from="node-order" data-to="node-order-line">
    <path d="M 780 430 L 730 520" stroke="#312e81" stroke-width="3" fill="none" marker-start="url(#diamond-filled)" />
    <rect x="715" y="460" width="30" height="20" rx="4" fill="#f8fafc" />
    <text x="730" y="474" text-anchor="middle" font-weight="700" font-size="12" fill="#312e81">1..*</text>
  </g>

  <g id="edge-order-to-shippingaddress" role="img" aria-label="Composition: ORDER contains 1 SHIPPING_ADDRESS" data-semantic-role="edge" data-from="node-order" data-to="node-shipping-address">
    <path d="M 1020 430 L 1070 520" stroke="#312e81" stroke-width="3" fill="none" marker-start="url(#diamond-filled)" />
    <rect x="1055" y="460" width="30" height="20" rx="4" fill="#f8fafc" />
    <text x="1070" y="474" text-anchor="middle" font-weight="700" font-size="12" fill="#312e81">1</text>
  </g>


  <g id="node-order" role="img" aria-label="Aggregate Root: ORDER with properties id, status, totalAmount and behaviors addItem, submitOrder" data-semantic-role="aggregate-root" data-upstream="node-addlineitemcmd,node-submitordercmd" data-downstream="node-lineitemaddedevt,node-ordersubmittedevt,node-order-line,node-shipping-address">
    <g transform="translate(620, 220)" filter="url(#shadow)">
      <rect width="560" height="210" rx="8" fill="#ffffff" stroke="#818cf8" stroke-width="3" />
      <rect width="560" height="50" rx="8" fill="#e0e7ff" />
      <rect y="25" width="560" height="25" fill="#e0e7ff" />
      <text x="280" y="22" text-anchor="middle" font-weight="800" font-size="12" fill="#4338ca">&lt;&lt;Aggregate Root&gt;&gt;</text>
      <text x="280" y="42" text-anchor="middle" font-weight="800" font-size="18" fill="#312e81">ORDER</text>
      <line x1="0" y1="50" x2="560" y2="50" stroke="#818cf8" stroke-width="3" />

      <text x="20" y="75" font-weight="700" font-size="14" fill="#475569">State (Properties)</text>
      <line x1="20" y1="82" x2="260" y2="82" stroke="#e2e8f0" stroke-width="2" />

      <text x="20" y="105" font-weight="700" font-size="13" fill="#1e293b">+ id:</text>
      <text x="80" y="105" font-weight="500" font-size="13" fill="#64748b">OrderId (UUID)</text>

      <text x="20" y="130" font-weight="700" font-size="13" fill="#1e293b">+ status:</text>
      <text x="90" y="130" font-weight="500" font-size="13" fill="#64748b">OrderStatus [NEW, PENDING, SHIPPED]</text>

      <text x="20" y="155" font-weight="700" font-size="13" fill="#1e293b">+ totalAmount:</text>
      <text x="125" y="155" font-weight="500" font-size="13" fill="#64748b">Money</text>

      <line x1="280" y1="50" x2="280" y2="210" stroke="#818cf8" stroke-width="2" stroke-dasharray="4,4" />

      <text x="300" y="75" font-weight="700" font-size="14" fill="#475569">Behaviors (State Transitions)</text>
      <line x1="300" y1="82" x2="540" y2="82" stroke="#e2e8f0" stroke-width="2" />

      <text x="300" y="105" font-weight="700" font-size="13" fill="#0284c7">+ addItem(productId, qty)</text>
      <text x="320" y="125" font-weight="500" font-size="11" fill="#64748b">➔ Re-calculates totalAmount</text>

      <text x="300" y="155" font-weight="700" font-size="13" fill="#0284c7">+ submitOrder()</text>
      <text x="320" y="175" font-weight="500" font-size="11" fill="#64748b">➔ Sets status to PENDING</text>
    </g>
  </g>


  <g id="annotation-business-invariants" role="img" aria-label="Sticky note listing business invariants: must have at least 1 LineItem to submitOrder, cannot addItem if status is not NEW" data-semantic-role="annotation">
    <g transform="translate(1080, 150) rotate(2)" filter="url(#shadow)">
      <rect width="240" height="110" fill="#fef9c3" stroke="#facc15" stroke-width="1" />
      <rect width="240" height="20" fill="#fde047" />
      <text x="120" y="14" text-anchor="middle" font-weight="800" font-size="11" fill="#854d0e">BUSINESS INVARIANTS</text>

      <circle cx="15" cy="40" r="3" fill="#a16207" />
      <text x="25" y="44" font-weight="600" font-size="12" fill="#713f12">Must have ≥ 1 LineItem</text>
      <text x="25" y="58" font-weight="600" font-size="12" fill="#713f12">to execute submitOrder()</text>

      <circle cx="15" cy="80" r="3" fill="#a16207" />
      <text x="25" y="84" font-weight="600" font-size="12" fill="#713f12">Cannot addItem() if</text>
      <text x="25" y="98" font-weight="600" font-size="12" fill="#713f12">status != NEW</text>

      <path d="M -10 90 L -100 90" stroke="#facc15" stroke-width="2" stroke-dasharray="4,4" fill="none" />
    </g>
  </g>


  <g id="node-order-line" role="img" aria-label="Local Entity: ORDER_LINE with lineId, productId, quantity, price" data-semantic-role="node" data-upstream="node-order">
    <g transform="translate(520, 520)" filter="url(#shadow)">
      <rect width="280" height="150" rx="8" fill="#ffffff" stroke="#34d399" stroke-width="2" />
      <rect width="280" height="40" rx="8" fill="#ecfdf5" />
      <rect y="20" width="280" height="20" fill="#ecfdf5" />
      <text x="140" y="18" text-anchor="middle" font-weight="800" font-size="11" fill="#047857">&lt;&lt;Local Entity&gt;&gt;</text>
      <text x="140" y="34" text-anchor="middle" font-weight="800" font-size="14" fill="#022c22">ORDER_LINE</text>
      <line x1="0" y1="40" x2="280" y2="40" stroke="#34d399" stroke-width="2" />

      <text x="20" y="65" font-weight="700" font-size="12" fill="#1e293b">+ lineId:</text>
      <text x="80" y="65" font-weight="500" font-size="12" fill="#64748b">UUID (Local Identity)</text>

      <text x="20" y="90" font-weight="700" font-size="12" fill="#1e293b">+ productId:</text>
      <text x="100" y="90" font-weight="500" font-size="12" fill="#64748b">UUID</text>

      <text x="20" y="115" font-weight="700" font-size="12" fill="#1e293b">+ quantity:</text>
      <text x="90" y="115" font-weight="500" font-size="12" fill="#64748b">Integer</text>

      <text x="20" y="140" font-weight="700" font-size="12" fill="#1e293b">+ price:</text>
      <text x="70" y="140" font-weight="500" font-size="12" fill="#64748b">Money</text>
    </g>
  </g>


  <g id="node-shipping-address" role="img" aria-label="Value Object: SHIPPING_ADDRESS with street, city, zipCode - immutable, no identity" data-semantic-role="value-object" data-upstream="node-order">
    <g transform="translate(1000, 520)" filter="url(#shadow)">
      <rect width="280" height="150" rx="8" fill="#ffffff" stroke="#c084fc" stroke-width="2" />
      <rect width="280" height="40" rx="8" fill="#faf5ff" />
      <rect y="20" width="280" height="20" fill="#faf5ff" />
      <text x="140" y="18" text-anchor="middle" font-weight="800" font-size="11" fill="#7e22ce">&lt;&lt;Value Object&gt;&gt;</text>
      <text x="140" y="34" text-anchor="middle" font-weight="800" font-size="14" fill="#4c1d95">SHIPPING_ADDRESS</text>
      <line x1="0" y1="40" x2="280" y2="40" stroke="#c084fc" stroke-width="2" />

      <text x="20" y="65" font-weight="700" font-size="12" fill="#1e293b">+ street:</text>
      <text x="80" y="65" font-weight="500" font-size="12" fill="#64748b">String</text>

      <text x="20" y="90" font-weight="700" font-size="12" fill="#1e293b">+ city:</text>
      <text x="60" y="90" font-weight="500" font-size="12" fill="#64748b">String</text>

      <text x="20" y="115" font-weight="700" font-size="12" fill="#1e293b">+ zipCode:</text>
      <text x="90" y="115" font-weight="500" font-size="12" fill="#64748b">String</text>

      <line x1="20" y1="130" x2="260" y2="130" stroke="#f3e8ff" stroke-width="2" />
      <text x="140" y="142" text-anchor="middle" font-weight="600" font-size="10" fill="#a855f7">(Immutable. No Identity.)</text>
    </g>
  </g>


  <g id="legend" role="img" aria-label="Legend explaining aggregate root, local entity, value object, and business invariant concepts" data-semantic-role="legend">
    <g transform="translate(100, 780)">
      <rect width="1600" height="180" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
      <text x="800" y="30" text-anchor="middle" font-weight="800" font-size="14" fill="#334155">AGGREGATE PATTERN LEGEND &amp; RULES</text>
      <line x1="20" y1="45" x2="1580" y2="45" stroke="#e2e8f0" stroke-width="2" />

      <rect x="40" y="65" width="40" height="24" rx="4" fill="#e0e7ff" stroke="#818cf8" stroke-width="2" />
      <text x="95" y="82" font-weight="800" font-size="14" fill="#1e293b">Aggregate Root</text>
      <text x="95" y="102" font-weight="500" font-size="12" fill="#64748b">The single entry point. External objects hold</text>
      <text x="95" y="122" font-weight="500" font-size="12" fill="#64748b">references ONLY to the Root, never its children.</text>

      <rect x="450" y="65" width="40" height="24" rx="4" fill="#ecfdf5" stroke="#34d399" stroke-width="2" />
      <text x="505" y="82" font-weight="800" font-size="14" fill="#1e293b">Local Entity</text>
      <text x="505" y="102" font-weight="500" font-size="12" fill="#64748b">An object inside the boundary with its own</text>
      <text x="505" y="122" font-weight="500" font-size="12" fill="#64748b">identity (e.g., Line Item 1 vs Line Item 2).</text>

      <rect x="850" y="65" width="40" height="24" rx="4" fill="#faf5ff" stroke="#c084fc" stroke-width="2" />
      <text x="905" y="82" font-weight="800" font-size="14" fill="#1e293b">Value Object</text>
      <text x="905" y="102" font-weight="500" font-size="12" fill="#64748b">An object defined entirely by its attributes.</text>
      <text x="905" y="122" font-weight="500" font-size="12" fill="#64748b">It has no ID and is completely immutable.</text>

      <rect x="1250" y="65" width="40" height="24" rx="4" fill="#fef9c3" stroke="#facc15" stroke-width="2" />
      <text x="1305" y="82" font-weight="800" font-size="14" fill="#1e293b">Business Invariant</text>
      <text x="1305" y="102" font-weight="500" font-size="12" fill="#64748b">A strict rule that must be true at the end</text>
      <text x="1305" y="122" font-weight="500" font-size="12" fill="#64748b">of every single transaction or state transition.</text>
    </g>
  </g>

</svg>
