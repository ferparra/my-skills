<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 650" style="background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <!-- DIAGRAM_TYPE: pipeline -->
  <!-- TOPOLOGY: Linear chain of 4 nodes (Source -> Filter -> Transform -> Sink) with 1 error branch to Dead Letter Queue. 5 nodes, 4 edges (3 main + 1 error). -->
  <desc>A pipeline communication pattern showing sequential data transformation. Raw events flow from a Source (event stream) through Stage 1 Filter (parser and validator) to Stage 2 Transform (business logic mapper) and finally to a Destination Sink (data warehouse). Schema mismatches at the Filter stage are routed to a Dead Letter Queue for human review. Each stage passes a progressively refined data artifact: raw event JSON, validated object, enriched record.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>

  <g id="diagram-title" role="heading" data-semantic-role="title">
    <text x="800" y="60" text-anchor="middle" font-weight="700" font-size="24" fill="#1e293b" letter-spacing="1">PIPELINE COMMUNICATION PATTERN</text>
    <text x="800" y="90" text-anchor="middle" font-weight="600" font-size="16" fill="#475569" letter-spacing="0.5">SEQUENTIAL DATA TRANSFORMATION (ASSEMBLY LINE)</text>
  </g>

  <g id="edge-source-to-filter" role="img" aria-label="Edge from Source to Stage 1 Filter" data-semantic-role="edge" data-from="node-source" data-to="node-filter">
    <path d="M 310 280 L 475 280" stroke="#94a3b8" stroke-width="4" fill="none" marker-end="url(#arrow)" />
    <g id="label-raw-event-json" role="img" aria-label="Edge label: Raw Event JSON" data-semantic-role="label">
      <rect x="322.5" y="240" width="140" height="24" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" />
      <text x="392.5" y="256" text-anchor="middle" font-weight="600" font-size="12" fill="#475569">RAW EVENT JSON</text>
    </g>
  </g>

  <g id="edge-filter-to-transform" role="img" aria-label="Edge from Stage 1 Filter to Stage 2 Transform" data-semantic-role="edge" data-from="node-filter" data-to="node-transform">
    <path d="M 710 280 L 875 280" stroke="#94a3b8" stroke-width="4" fill="none" marker-end="url(#arrow)" />
    <g id="label-validated-object" role="img" aria-label="Edge label: Validated Object" data-semantic-role="label">
      <rect x="722.5" y="240" width="140" height="24" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" />
      <text x="792.5" y="256" text-anchor="middle" font-weight="600" font-size="12" fill="#475569">VALIDATED OBJECT</text>
    </g>
  </g>

  <g id="edge-transform-to-sink" role="img" aria-label="Edge from Stage 2 Transform to Destination Sink" data-semantic-role="edge" data-from="node-transform" data-to="node-sink">
    <path d="M 1110 280 L 1275 280" stroke="#94a3b8" stroke-width="4" fill="none" marker-end="url(#arrow)" />
    <g id="label-enriched-record" role="img" aria-label="Edge label: Enriched Record" data-semantic-role="label">
      <rect x="1122.5" y="240" width="140" height="24" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" />
      <text x="1192.5" y="256" text-anchor="middle" font-weight="600" font-size="12" fill="#475569">ENRICHED RECORD</text>
    </g>
  </g>

  <g id="edge-filter-to-dlq" role="img" aria-label="Error edge from Filter to Dead Letter Queue" data-semantic-role="edge" data-from="node-filter" data-to="node-dead-letter-queue">
    <path d="M 600 320 L 600 445" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)" stroke-dasharray="6,6" />
    <g id="label-schema-mismatch" role="img" aria-label="Edge label: Schema Mismatch" data-semantic-role="label">
      <rect x="525" y="365" width="150" height="24" rx="4" fill="#fff1f2" stroke="#fecdd3" stroke-width="1.5" />
      <text x="600" y="381" text-anchor="middle" font-weight="600" font-size="12" fill="#e11d48">Schema Mismatch</text>
    </g>
  </g>

  <g id="node-source" role="img" aria-label="Source node: Event Stream / Queue that extracts raw data blocks" data-semantic-role="node" data-downstream="node-filter">
    <g transform="translate(90, 240)">
      <rect width="220" height="80" rx="12" fill="#faf5ff" stroke="#e9d5ff" stroke-width="2" />
      <text x="110" y="35" text-anchor="middle" font-weight="700" font-size="15" fill="#581c87">SOURCE</text>
      <text x="110" y="55" text-anchor="middle" font-weight="400" font-size="12" fill="#7e22ce">Event Stream / Queue</text>
    </g>
    <text x="200" y="350" text-anchor="middle" font-weight="500" font-size="13" fill="#64748b">Extracts raw data blocks</text>
  </g>

  <g id="node-filter" role="img" aria-label="Stage 1 Filter node: Parser and Validator that drops bad formats and applies schema" data-semantic-role="node" data-upstream="node-source" data-downstream="node-transform,node-dead-letter-queue">
    <g transform="translate(490, 240)">
      <rect width="220" height="80" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="2" />
      <text x="110" y="35" text-anchor="middle" font-weight="700" font-size="15" fill="#431407">STAGE 1: FILTER</text>
      <text x="110" y="55" text-anchor="middle" font-weight="400" font-size="12" fill="#c2410c">Parser &amp; Validator</text>
    </g>
    <text x="600" y="350" text-anchor="middle" font-weight="500" font-size="13" fill="#64748b">Drops bad formats, applies schema</text>
  </g>

  <g id="node-transform" role="img" aria-label="Stage 2 Transform node: Business Logic Mapper that formats fields and merges API data" data-semantic-role="node" data-upstream="node-filter" data-downstream="node-sink">
    <g transform="translate(890, 240)">
      <rect width="220" height="80" rx="12" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="2" />
      <text x="110" y="35" text-anchor="middle" font-weight="700" font-size="15" fill="#022c22">STAGE 2: TRANSFORM</text>
      <text x="110" y="55" text-anchor="middle" font-weight="400" font-size="12" fill="#047857">Business Logic Mapper</text>
    </g>
    <text x="1000" y="350" text-anchor="middle" font-weight="500" font-size="13" fill="#64748b">Formats fields, merges API data</text>
  </g>

  <g id="node-sink" role="img" aria-label="Destination Sink node: Data Warehouse / DB that persists finalized records" data-semantic-role="node" data-upstream="node-transform">
    <g transform="translate(1290, 240)">
      <rect width="220" height="80" rx="12" fill="#e0e7ff" stroke="#818cf8" stroke-width="3" />
      <text x="110" y="35" text-anchor="middle" font-weight="700" font-size="15" fill="#312e81">DESTINATION SINK</text>
      <text x="110" y="55" text-anchor="middle" font-weight="400" font-size="12" fill="#4338ca">Data Warehouse / DB</text>
    </g>
    <text x="1400" y="350" text-anchor="middle" font-weight="500" font-size="13" fill="#64748b">Persists finalized records</text>
  </g>

  <g id="node-dead-letter-queue" role="img" aria-label="Dead Letter Queue node: Isolates errors for human review" data-semantic-role="node" data-upstream="node-filter">
    <g transform="translate(490, 460)">
      <rect width="220" height="60" rx="12" fill="#fdf2f8" stroke="#fbcfe8" stroke-width="2" />
      <text x="110" y="27" text-anchor="middle" font-weight="700" font-size="14" fill="#4c0b20">DEAD LETTER QUEUE</text>
      <text x="110" y="43" text-anchor="middle" font-weight="400" font-size="11" fill="#be185d">Isolates errors for human review</text>
    </g>
  </g>

</svg>