<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 650" style="background-color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <!-- DIAGRAM_TYPE: causal_loop -->
  <!-- TOPOLOGY: closed-loop feedback control; 4 nodes (summing junction, controller, plant, sensor), 6 directed edges including feedback path; linear pipeline with single feedback loop -->
  <desc>A typical feedback control system (closed-loop). A reference input r(t) enters a summing junction where it is compared with a feedback signal. The resulting error e(t) drives a Controller, which produces a control action u(t) sent to the Plant/Process. The plant produces an output y(t) (the controlled variable). A Sensor measures the output and feeds it back to the summing junction with negative polarity, closing the loop. An external disturbance d(t) can perturb the plant.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>

  <g id="diagram-title" role="heading" data-semantic-role="title">
    <text x="700" y="60" text-anchor="middle" font-weight="700" font-size="20" fill="#1e293b" letter-spacing="1">TYPICAL FEEDBACK CONTROL SYSTEM</text>
  </g>

  <g id="node-summing-junction" role="img" aria-label="Summing junction comparing reference input with feedback signal" data-semantic-role="node" data-downstream="node-controller" data-upstream="node-sensor">
    <circle cx="250" cy="300" r="25" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" />
    <text x="235" y="295" text-anchor="middle" font-weight="700" font-size="16" fill="#334155">+</text>
    <text x="262" y="322" text-anchor="middle" font-weight="700" font-size="18" fill="#334155">-</text>
  </g>

  <g id="node-controller" role="img" aria-label="Controller block that processes the error signal" data-semantic-role="node" data-downstream="node-plant" data-upstream="node-summing-junction">
    <rect x="400" y="270" width="150" height="60" rx="12" fill="#e0e7ff" stroke="#818cf8" stroke-width="2" />
    <text x="475" y="306" text-anchor="middle" font-weight="600" font-size="14" fill="#312e81">Controller</text>
  </g>

  <g id="node-plant" role="img" aria-label="Plant or process being controlled" data-semantic-role="node" data-downstream="node-sensor" data-upstream="node-controller">
    <rect x="700" y="270" width="180" height="60" rx="12" fill="#d1fae5" stroke="#34d399" stroke-width="2" />
    <text x="790" y="306" text-anchor="middle" font-weight="600" font-size="14" fill="#064e3b">Plant / Process</text>
  </g>

  <g id="node-sensor" role="img" aria-label="Sensor that measures the plant output" data-semantic-role="node" data-downstream="node-summing-junction" data-upstream="node-plant">
    <rect x="550" y="470" width="150" height="60" rx="12" fill="#ffedd5" stroke="#fb923c" stroke-width="2" />
    <text x="625" y="506" text-anchor="middle" font-weight="600" font-size="14" fill="#7c2d12">Sensor</text>
  </g>

  <g id="edge-reference-to-junction" role="img" aria-label="Reference input r(t) entering the summing junction" data-semantic-role="edge" data-from="external-input" data-to="node-summing-junction">
    <text x="130" y="275" text-anchor="middle" font-weight="600" font-size="12" fill="#475569">Reference Input r(t)</text>
    <text x="130" y="295" text-anchor="middle" font-weight="400" font-size="11" fill="#64748b">(Setpoint)</text>
    <path d="M 60 300 L 215 300" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  </g>

  <g id="edge-junction-to-controller" role="img" aria-label="Error signal e(t) from summing junction to controller" data-semantic-role="edge" data-from="node-summing-junction" data-to="node-controller">
    <text x="325" y="288" text-anchor="middle" font-weight="600" font-size="12" fill="#475569">Error e(t)</text>
    <path d="M 275 300 L 390 300" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  </g>

  <g id="edge-controller-to-plant" role="img" aria-label="Control action u(t) from controller to plant" data-semantic-role="edge" data-from="node-controller" data-to="node-plant">
    <text x="625" y="288" text-anchor="middle" font-weight="600" font-size="12" fill="#475569">Control Action u(t)</text>
    <path d="M 550 300 L 690 300" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  </g>

  <g id="edge-plant-to-output" role="img" aria-label="Output y(t) from plant to controlled variable" data-semantic-role="edge" data-from="node-plant" data-to="external-output">
    <text x="940" y="288" text-anchor="middle" font-weight="600" font-size="12" fill="#475569">Output y(t)</text>
    <path d="M 880 300 L 1150 300" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)" />
    <text x="1230" y="295" text-anchor="middle" font-weight="600" font-size="12" fill="#475569">Controlled Variable</text>
    <text x="1230" y="315" text-anchor="middle" font-weight="400" font-size="11" fill="#64748b">(Actual State)</text>
  </g>

  <g id="edge-output-tap" role="img" aria-label="Tap point where output is sampled for measurement" data-semantic-role="annotation">
    <circle cx="1000" cy="300" r="4" fill="#64748b" />
  </g>

  <g id="edge-output-to-sensor" role="img" aria-label="Measured output signal from tap point to sensor" data-semantic-role="edge" data-from="node-plant" data-to="node-sensor">
    <text x="855" y="488" text-anchor="middle" font-weight="600" font-size="12" fill="#475569">Measured Output</text>
    <path d="M 1000 300 L 1000 500 L 710 500" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  </g>

  <g id="edge-sensor-to-junction" role="img" aria-label="Feedback signal from sensor back to summing junction" data-semantic-role="edge" data-from="node-sensor" data-to="node-summing-junction">
    <text x="400" y="488" text-anchor="middle" font-weight="600" font-size="12" fill="#475569">Feedback Signal</text>
    <path d="M 540 500 L 250 500 L 250 335" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  </g>

  <g id="edge-disturbance" role="img" aria-label="External disturbance d(t) acting on the plant" data-semantic-role="edge" data-from="external-disturbance" data-to="node-plant">
    <text x="790" y="145" text-anchor="middle" font-weight="600" font-size="12" fill="#475569">Disturbance d(t)</text>
    <path d="M 790 160 L 790 260" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)" stroke-dasharray="4,4" />
  </g>

</svg>